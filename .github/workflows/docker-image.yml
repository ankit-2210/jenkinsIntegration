name: Docker Image CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout Source Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Java 21
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # Build Spring Boot JAR
    - name: Build Jar
      run: mvn clean package -DskipTests

    # Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-springboot:latest .

    # Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-springboot:latest

    # Deploy on AWS EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop springboot-app || true
          docker rm springboot-app || true
          docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-springboot:latest || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-springboot:latest
          docker run -d \
            --name springboot-app \
            -p 9090:9090 \
            ${{ secrets.DOCKERHUB_USERNAME }}/jenkins-springboot:latest
